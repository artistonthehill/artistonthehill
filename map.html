function initMap() {
  const map = new google.maps.Map(document.getElementById('map'), {
    zoom: 6, center: {lat:52.0, lng:-2.0},
    mapTypeControl: true, streetViewControl: false, fullscreenControl: true,
    styles: [{featureType:'poi', elementType:'labels', stylers:[{visibility:'off'}]}]
  });
  const infoWindow = new google.maps.InfoWindow({maxWidth:250});
  const bounds = new google.maps.LatLngBounds();
  paintings.forEach(p => {
    const isUK = p.lat > 49 && p.lat < 62 && p.lng > -9 && p.lng < 2.5;
    if (isUK) bounds.extend({lat:p.lat, lng:p.lng});
    const marker = new google.maps.Marker({
      position:{lat:p.lat, lng:p.lng}, map:map, title:p.title,
      icon:{path:google.maps.SymbolPath.CIRCLE, scale:9, fillColor:'#8b6f47', fillOpacity:0.9, strokeColor:'#ffffff', strokeWeight:2}
    });
    marker.addListener('click', () => {
      const msg = encodeURIComponent('Hello Tony, I'm interested in "' + p.title + '" (' + p.price + ').');
      const imgHtml = p.img ? '<img class="iw-img" src="' + p.img + '" alt="' + p.title + '" onerror="this.style.display='none'">' : '';
      infoWindow.setContent('<div class="iw-wrap">' + imgHtml +
        '<div class="iw-title">' + p.title + '</div>' +
        '<div class="iw-size">' + p.size + '</div>' +
        '<div class="iw-price">' + p.price + '</div>' +
        '<a class="iw-btn" href="https://wa.me/447880601709?text=' + msg + '" target="_blank">Enquire via WhatsApp</a></div>');
      infoWindow.open(map, marker);
    });
  });
  map.fitBounds(bounds, {padding:50});
}
