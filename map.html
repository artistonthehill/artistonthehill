<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where I Paint — Tony Parsons | Artist on the Hill</title>
<meta name="description" content="77 original oil paintings mapped to their exact locations — from Sussex to the Bahamas, Amalfi to the Alps. Tony Parsons, plein air painter.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Karla:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1714; --parchment:#f7f4ef; --warm-mid:#e8e2d9;
    --accent:#8b6f47; --accent-light:#c49a6c; --white:#fff;
    --text-light:#7a6e65; --nav-h:64px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body { font-family:'Karla',sans-serif; background:var(--parchment); color:var(--ink); display:flex; flex-direction:column; }

  nav {
    height:var(--nav-h); background:var(--parchment);
    border-bottom:1px solid var(--warm-mid);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 32px; flex-shrink:0;
  }
  .nav-logo { font-family:'Cormorant Garamond',serif; font-size:1.15rem; font-weight:400; letter-spacing:0.08em; color:var(--ink); text-decoration:none; line-height:1.2; }
  .nav-logo span { display:block; font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-light); font-family:'Karla',sans-serif; }
  .nav-back { font-family:'Karla',sans-serif; font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-light); text-decoration:none; transition:color 0.2s; }
  .nav-back:hover { color:var(--accent); }

  .map-header {
    padding:20px 32px 16px;
    display:flex; align-items:baseline; justify-content:space-between;
    flex-wrap:wrap; gap:8px; flex-shrink:0;
    border-bottom:1px solid var(--warm-mid);
  }
  .map-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; }
  .map-title em { font-style:italic; color:var(--accent); }
  .map-subtitle { font-family:'Karla',sans-serif; font-size:0.72rem; color:var(--text-light); letter-spacing:0.08em; }

  .map-wrap { flex:1; position:relative; min-height:0; }
  .map-wrap iframe { width:100%; height:100%; border:none; display:block; min-height:500px; }

  .map-footer {
    padding:12px 32px;
    display:flex; align-items:center; justify-content:space-between;
    flex-wrap:wrap; gap:12px;
    border-top:1px solid var(--warm-mid);
    background:var(--parchment); flex-shrink:0;
  }
  .map-note { font-family:'Karla',sans-serif; font-size:0.72rem; color:var(--text-light); }
  .wa-link {
    display:inline-flex; align-items:center; gap:8px;
    background:var(--ink); color:var(--white);
    padding:9px 18px; font-family:'Karla',sans-serif;
    font-size:0.7rem; font-weight:500; letter-spacing:0.14em;
    text-transform:uppercase; text-decoration:none; transition:background 0.2s;
  }
  .wa-link:hover { background:var(--accent); }

  @media(max-width:600px) {
    nav { padding:0 16px; }
    .map-header { padding:14px 16px 12px; }
    .map-footer { padding:10px 16px; }
    .map-title { font-size:1.2rem; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Tony Parsons <span>Artist on the Hill</span></a>
  <a href="index.html" class="nav-back">← Back to site</a>
</nav>

<div class="map-header">
  <div>
    <div class="map-title">Where I <em>Paint</em></div>
    <div class="map-subtitle">77 paintings · Sussex to the Bahamas · tap any pin to see more</div>
  </div>
</div>

<div class="map-wrap">
  <iframe
    src="https://www.google.com/maps/d/u/0/embed?mid=1GSmtJ1RlFMByds9B8hbt8ycnkHSVZjo&ehbc=2E312F"
    allowfullscreen
    loading="lazy"
    referrerpolicy="no-referrer-when-downgrade">
  </iframe>
</div>

<div class="map-footer">
  <p class="map-note">Tap any pin to see the painting · zoom and explore freely · opens in Google Maps on your phone</p>
  <a href="https://wa.me/447880601709?text=Hello%20Tony%2C%20I%20found%20you%20on%20the%20map%20and%20I%27m%20interested%20in%20a%20painting." class="wa-link" target="_blank">Enquire via WhatsApp</a>
</div>

</body>
</html>
