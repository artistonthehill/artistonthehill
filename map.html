<div id="map"></div>
<script>
// Map is initialised once both the Google Maps API and paintings.json are ready.
// Whichever loads last triggers initMap().

let paintingsData = null;
let mapsApiReady  = false;

// Fetch paintings.json — add cache-busting so new uploads appear immediately
fetch('paintings.json?v=' + Date.now())
  .then(r => r.json())
  .then(data => {
    paintingsData = data;
    if (mapsApiReady) initMap();
  })
  .catch(err => console.error('Could not load paintings.json:', err));

// Called by Google Maps API once loaded
function onMapsReady() {
  mapsApiReady = true;
  if (paintingsData) initMap();
}

function initMap() {
  const map = new google.maps.Map(document.getElementById('map'), {
    zoom: 6, center: {lat:52.0, lng:-2.0},
    mapTypeControl: true, streetViewControl: false, fullscreenControl: true,
    styles: [{featureType:'poi', elementType:'labels', stylers:[{visibility:'off'}]}]
  });
  const infoWindow = new google.maps.InfoWindow({maxWidth:250});
  const bounds = new google.maps.LatLngBounds();

  paintingsData.forEach(p => {
    const isUK = p.lat > 49 && p.lat < 62 && p.lng > -9 && p.lng < 2.5;
    if (isUK) bounds.extend({lat:p.lat, lng:p.lng});
    const marker = new google.maps.Marker({
      position:{lat:p.lat, lng:p.lng}, map:map, title:p.title,
      icon:{path:google.maps.SymbolPath.CIRCLE, scale:9, fillColor:'#8b6f47', fillOpacity:0.9, strokeColor:'#ffffff', strokeWeight:2}
    });
    marker.addListener('click', () => {
      const msg = encodeURIComponent('Hello Tony, I am interested in ' + p.title + ' (' + p.price + ').');
      const viewParams = new URLSearchParams({ img: p.img || '', title: p.title, meta: p.size, price: p.price, back: 'map.html' });
      if (p.prints) viewParams.set('prints', p.prints);
      const viewUrl = 'painting-view.html?' + viewParams.toString();
      const imgHtml = p.img ? '<a href="' + viewUrl + '"><img class="iw-img" src="' + p.img + '" alt="' + p.title + '" style="cursor:pointer;" title="Click to view full size"></a>' : '';
      infoWindow.setContent('<div class="iw-wrap">' + imgHtml + '<div class="iw-title">' + p.title + '</div><div class="iw-size">' + p.size + '</div><div class="iw-price">' + p.price + '</div><a class="iw-btn" href="' + viewUrl + '" style="margin-bottom:6px;">View painting →</a><a class="iw-btn" href="https://wa.me/447880601709?text=' + msg + '" target="_blank" style="background:#8b6f47;">Enquire via WhatsApp</a></div>');
      infoWindow.open(map, marker);
    });
  });
  map.fitBounds(bounds, {padding:50});
}
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBYredcbFKqrJLNSWO0iDtrzarFLgCOoKs&callback=onMapsReady"></script>
